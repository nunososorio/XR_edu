name: Deploy Documentation to GitHub Pages

on:
  push:
    branches:
      - main
      - master
    paths:
      - '*.md'
      - 'docs/**'
      - '.github/workflows/deploy-docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Copy documentation to docs folder
        run: |
          cp README.md docs/index.md
          cp GETTING_STARTED.md docs/
          cp SETUP_GUIDE.md docs/
          cp QUICK_REFERENCE.md docs/
          cp CUSTOMIZATION_GUIDE.md docs/
          cp COLLECTION_TEMPLATES.md docs/
          cp DOCKER_DEPLOYMENT.md docs/
          cp DEVELOPER_GUIDE.md docs/
          cp PROJECT_SUMMARY.md docs/
          cp INDEX.md docs/documentation-index.md

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'docs'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
